<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yugan - Photo Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">📸 Yugan</div>
    <nav>
      <a href="index.html" class="active">Gallery</a>
      <a href="admin.html">Admin</a>
      <button class="qr-btn" onclick="showQR()">Show QR Code</button>
    </nav>
  </header>

  <!-- QR MODAL -->
  <div id="qrModal" class="modal hidden">
    <div class="modal-box">
      <h2>Scan to Open Yugan Gallery</h2>
      <img id="qrImg" src="" alt="QR Code" />
      <p id="qrUrl"></p>
      <small>Scan with your phone camera to open this gallery</small>
      <button onclick="closeQR()">Close</button>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="modal hidden">
    <div class="lightbox-bg" onclick="closeLightbox()"></div>
    <div class="lightbox-content">
      <button class="lb-close" onclick="closeLightbox()">✕</button>
      <button class="lb-prev" onclick="changePhoto(-1)">&#8249;</button>
      <img id="lbImg" src="" alt="" />
      <button class="lb-next" onclick="changePhoto(1)">&#8250;</button>
    </div>
  </div>

  <!-- MAIN -->
  <main>
    <!-- FOLDER VIEW -->
    <div id="folderView">
      <h1>Photo Albums</h1>
      <div id="folderGrid" class="grid"></div>
    </div>

    <!-- PHOTO VIEW -->
    <div id="photoView" class="hidden">
      <button class="back-btn" onclick="backToFolders()">&#8592; Back to Albums</button>
      <h1 id="photoTitle"></h1>
      <div id="photoGrid" class="grid"></div>
    </div>
  </main>

  <script>
    let currentFolder = '';
    let photoList = [];
    let currentPhotoIndex = 0;

    async function loadFolders() {
      const res = await fetch('/api/folders');
      const folders = await res.json();
      const grid = document.getElementById('folderGrid');
      grid.innerHTML = '';
      if (folders.length === 0) {
        grid.innerHTML = '<p class="empty">No albums yet. Go to <a href="admin.html">Admin</a> to create one.</p>';
        return;
      }
      for (const folder of folders) {
        const photos = await fetch(`/api/folders/${encodeURIComponent(folder)}/photos`).then(r => r.json());
        const firstPhoto = photos[0];
        const thumb = photos.length ? ((firstPhoto && firstPhoto.url) ? firstPhoto.url : `/uploads/${encodeURIComponent(folder)}/${encodeURIComponent(firstPhoto)}`) : null;
        const card = document.createElement('div');
        card.className = 'card folder-card';
        card.onclick = () => openFolder(folder);
        card.innerHTML = `
          <div class="card-thumb">
            ${thumb ? `<img src="${thumb}" alt="${folder}" />` : '<div class="no-thumb">📁</div>'}
          </div>
          <div class="card-info">
            <span class="folder-name">📁 ${folder}</span>
            <span class="photo-count">${photos.length} photo${photos.length !== 1 ? 's' : ''}</span>
          </div>`;
        grid.appendChild(card);
      }
    }

    async function openFolder(folder) {
      currentFolder = folder;
      const res = await fetch(`/api/folders/${encodeURIComponent(folder)}/photos`);
      photoList = await res.json();
      document.getElementById('folderView').classList.add('hidden');
      document.getElementById('photoView').classList.remove('hidden');
      document.getElementById('photoTitle').textContent = '📁 ' + folder;
      const grid = document.getElementById('photoGrid');
      grid.innerHTML = '';
      if (photoList.length === 0) {
        grid.innerHTML = '<p class="empty">No photos in this album.</p>';
        return;
      }
      photoList.forEach((photo, i) => {
        const card = document.createElement('div');
        card.className = 'card photo-card';
        card.onclick = () => openLightbox(i);
        const src = (photo && photo.url) ? photo.url : `/uploads/${encodeURIComponent(folder)}/${encodeURIComponent(photo)}`;
        card.innerHTML = `<img src="${src}" alt="" loading="lazy"/>`;
        grid.appendChild(card);
      });
    }

    function backToFolders() {
      document.getElementById('photoView').classList.add('hidden');
      document.getElementById('folderView').classList.remove('hidden');
      loadFolders();
    }

    function openLightbox(index) {
      currentPhotoIndex = index;
      document.getElementById('lightbox').classList.remove('hidden');
      updateLightbox();
    }

    function updateLightbox() {
      const photo = photoList[currentPhotoIndex];
      const src = (photo && photo.url) ? photo.url : `/uploads/${encodeURIComponent(currentFolder)}/${encodeURIComponent(photo)}`;
      document.getElementById('lbImg').src = src;
    }

    function changePhoto(dir) {
      currentPhotoIndex = (currentPhotoIndex + dir + photoList.length) % photoList.length;
      updateLightbox();
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.add('hidden');
    }

    async function showQR() {
      const res = await fetch('/api/qrcode');
      const data = await res.json();
      document.getElementById('qrImg').src = data.qr;
      document.getElementById('qrUrl').textContent = data.url;
      document.getElementById('qrModal').classList.remove('hidden');
    }

    function closeQR() {
      document.getElementById('qrModal').classList.add('hidden');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeLightbox(); closeQR(); }
      if (e.key === 'ArrowRight') changePhoto(1);
      if (e.key === 'ArrowLeft') changePhoto(-1);
    });

    loadFolders();
  </script>
</body>
</html>
